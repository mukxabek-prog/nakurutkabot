<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flow Nakrutka Panel</title>
    <!-- Tailwind CSS (Dizayn chiroyli bo'lishi uchun) -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        body { background-color: #0f172a; color: #f8fafc; }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen p-4">

    <div class="w-full max-w-md bg-slate-800 p-8 rounded-2xl shadow-2xl border border-slate-700">
        <h2 class="text-3xl font-extrabold text-center mb-2 text-indigo-400">Flow SMM Panel</h2>
        <p class="text-slate-400 text-center text-sm mb-6">Akkauntlar orqali mutlaqo xavfsiz nakrutka</p>

        <!-- Buyurtma Formasi -->
        <form id="nakrutkaForm" class="space-y-4">
            <div>
                <label class="block text-sm font-medium mb-1 text-slate-300">Kanal yoki Guruh havolasi (Link)</label>
                <input type="url" id="channelLink" required placeholder="https://t.me/kanal_nomi" 
                       class="w-full px-4 py-2 bg-slate-900 border border-slate-700 rounded-lg focus:outline-none focus:border-indigo-500 text-white">
            </div>

            <div>
                <label class="block text-sm font-medium mb-1 text-slate-300">Obunachilar soni</label>
                <input type="number" id="count" required min="1" max="1000" placeholder="Masalan: 100" 
                       class="w-full px-4 py-2 bg-slate-900 border border-slate-700 rounded-lg focus:outline-none focus:border-indigo-500 text-white">
            </div>

            <button type="submit" 
                    class="w-full bg-indigo-600 hover:bg-indigo-500 text-white font-semibold py-2.5 rounded-lg transition duration-200 shadow-lg shadow-indigo-600/30">
                🚀 Nakrutkani Boshlash
            </button>
        </form>

        <!-- Status (Natija ko'rsatadigan joy) -->
        <div id="statusBox" class="mt-6 p-4 rounded-lg hidden text-center text-sm font-medium"></div>
    </div>

    <script>
        document.getElementById('nakrutkaForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const channelLink = document.getElementById('channelLink').value;
            const count = document.getElementById('count').value;
            const statusBox = document.getElementById('statusBox');
            
            // Statusni yuklanmoqda holatiga keltirish
            statusBox.className = "mt-6 p-4 rounded-lg text-center text-sm font-medium bg-indigo-950/50 text-indigo-300 border border-indigo-800";
            statusBox.innerText = "⏳ So'rov yuborilmoqda, kuting...";
            statusBox.classList.remove('hidden');

            try {
                // Backend serverga (Python API) ma'lumot jo'natish
                const response = await fetch('/api/start-nakrutka', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ link: channelLink, count: parseInt(count) })
                });

                const data = await response.json();

                if (response.ok) {
                    statusBox.className = "mt-6 p-4 rounded-lg text-center text-sm font-medium bg-emerald-950/50 text-emerald-400 border border-emerald-800";
                    statusBox.innerText = `✅ Muvaffaqiyatli! ${data.joined} ta akkaunt qo'shildi.`;
                } else {
                    statusBox.className = "mt-6 p-4 rounded-lg text-center text-sm font-medium bg-rose-950/50 text-rose-400 border border-rose-800";
                    statusBox.innerText = `❌ Xatolik: ${data.detail || 'Noma'lum xato'}`;
                }
            } catch (error) {
                statusBox.className = "mt-6 p-4 rounded-lg text-center text-sm font-medium bg-rose-950/50 text-rose-400 border border-rose-800";
                statusBox.innerText = "❌ Server bilan aloqa yo'q!";
            }
        });
    </script>
</body>
</html>
